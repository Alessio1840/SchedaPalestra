<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schede Palestra</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #111827;
    }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .center-screen {
      min-height: calc(100vh - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title-row h1,
    .sheet-header h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 20px 0;
      color: #64748b;
      font-size: 15px;
    }

    .button-grid {
      display: grid;
      gap: 14px;
    }

    .sheet-btn,
    .back-btn {
      border: 0;
      border-radius: 18px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 18px;
    }

    .sheet-btn {
      height: 58px;
      background: #e5e7eb;
      color: #111827;
      font-weight: 600;
    }

    .sheet-btn:hover,
    .sheet-btn.active {
      background: #000000;
      color: #ffffff;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 24px 28px;
      margin-bottom: 24px;
    }

    .back-btn {
      padding: 12px 18px;
      background: #ffffff;
      color: #111827;
      border: 1px solid #d1d5db;
      font-weight: 600;
    }

    .back-btn:hover {
      background: #f3f4f6;
    }

    .exercise-list {
      display: grid;
      gap: 16px;
    }

    .exercise-row {
      display: grid;
      grid-template-columns: 140px 170px 2fr 120px 100px;
      gap: 14px;
      align-items: center;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
    }

    .input-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-box {
      min-height: 68px;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: #ffffff;
    }

    .input-box span {
      color: #475569;
      font-size: 14px;
      min-width: 18px;
      text-align: center;
    }

    .input-box input {
      width: 100%;
      border: 0;
      outline: none;
      font-size: 16px;
      background: transparent;
      color: #111827;
    }

    .media-preview img,
    .media-preview video {
      width: 100%;
      height: 96px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      background: #e5e7eb;
    }

    .info-label {
      margin: 0 0 6px 0;
      color: #64748b;
      font-size: 14px;
    }

    .info-value {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .exercise-row {
        grid-template-columns: 1fr;
      }

      .sheet-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .media-preview img,
      .media-preview video {
        width: 180px;
      }
    }
  </style>
</head>
<body>
  <div id="homePage" class="page">
    <div class="container center-screen">
      <div class="card">
        <div class="title-row">
          <div style="font-size: 28px;">🏋️</div>
          <h1>Scegli la tua scheda</h1>
        </div>
        <p class="subtitle">No Pain, No Gain 💪</p>
        <div class="button-grid">
          <button class="sheet-btn" onclick="openSheet('scheda1')">Scheda Braccia</button>
          <button class="sheet-btn" onclick="openSheet('scheda2')">Scheda Gambe</button>
        </div>
      </div>
    </div>
  </div>

  <div id="sheetPage" class="page" style="display: none;">
    <div class="container">
      <div class="sheet-header">
        <h1 id="sheetTitle"></h1>
        <button class="back-btn" onclick="goHome()">← Torna alla scelta delle schede</button>
      </div>
      <div id="exerciseList" class="exercise-list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'gym_workout_site_user_data';

    const workoutTemplates = {
      scheda1: {
        title: 'Scheda Braccia',
        exercises: [
          { id: 1, name: 'Curl Manubri', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'https://placehold.co/160x100?text=Curl+Manubri' },
          { id: 2, name: 'Push Down Cavo', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'https://placehold.co/160x100?text=Push+Down' },
          { id: 3, name: 'Hammer Curl', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'https://placehold.co/160x100?text=Hammer+Curl' },
          { id: 4, name: 'French Press', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'https://placehold.co/160x100?text=French+Press' }
        ]
      },
      scheda2: {
        title: 'Scheda Gambe',
        exercises: [
          { id: 1, name: 'Squat Corpo Libero', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'images/squat.png' },
          { id: 2, name: 'Leg Press', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'images/legpress.png' },
          { id: 3, name: 'Spinte Bacino', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'images/hipthrust.png' },
          { id: 4, name: 'Adductor Machine', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'images/adductor.png' },
          { id: 5, name: 'Abductor Machine', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'images/abductor.png' },
          { id: 6, name: 'Leg Curl', reps: '12', sets: '3', mediaType: 'image', mediaUrl: 'images/legcurl.png' }
        ]
      }
    };

    let selectedSheet = null;
    let userValues = {};

    function loadValues() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        userValues = saved ? JSON.parse(saved) : {};
      } catch (error) {
        console.error('Errore nel caricamento dei dati salvati:', error);
        userValues = {};
      }
    }

    function saveValues() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userValues));
      } catch (error) {
        console.error('Errore nel salvataggio dei dati:', error);
      }
    }

    function openSheet(sheetKey) {
      selectedSheet = sheetKey;
      renderSheet();
      document.getElementById('homePage').style.display = 'none';
      document.getElementById('sheetPage').style.display = 'block';
    }

    function goHome() {
      selectedSheet = null;
      document.getElementById('sheetPage').style.display = 'none';
      document.getElementById('homePage').style.display = 'block';
    }

    function updateValue(sheetKey, exerciseId, field, value) {
      if (!userValues[sheetKey]) {
        userValues[sheetKey] = {};
      }
      if (!userValues[sheetKey][exerciseId]) {
        userValues[sheetKey][exerciseId] = { kg: '', sec: '' };
      }
      userValues[sheetKey][exerciseId][field] = value;
      saveValues();
    }

    function createMedia(exercise) {
      if (exercise.mediaType === 'video') {
        return `<video src="${exercise.mediaUrl}" muted autoplay loop playsinline></video>`;
      }
      return `<img src="${exercise.mediaUrl}" alt="${exercise.name}">`;
    }

    function renderSheet() {
      const sheet = workoutTemplates[selectedSheet];
      if (!sheet) return;

      document.getElementById('sheetTitle').textContent = sheet.title;

      const list = document.getElementById('exerciseList');
      list.innerHTML = '';

      sheet.exercises.forEach((exercise) => {
        const entry = (userValues[selectedSheet] && userValues[selectedSheet][exercise.id]) || { kg: '', sec: '' };

        const row = document.createElement('div');
        row.className = 'exercise-row';
        row.innerHTML = `
          <div class="input-column">
            <label class="input-box">
              <span>🏋️</span>
              <input type="text" placeholder="Kg" value="${entry.kg}">
            </label>
            <label class="input-box">
              <span>⏱️</span>
              <input type="text" placeholder="Sec" value="${entry.sec}">
            </label>
          </div>

          <div class="media-preview">
            ${createMedia(exercise)}
          </div>

          <div>
            <p class="info-label">Esercizio</p>
            <p class="info-value">${exercise.name}</p>
          </div>

          <div>
            <p class="info-label">Ripetizioni</p>
            <p class="info-value">${exercise.reps}</p>
          </div>

          <div>
            <p class="info-label">Serie</p>
            <p class="info-value">${exercise.sets}</p>
          </div>
        `;

        const inputs = row.querySelectorAll('input');
        inputs[0].addEventListener('input', function () {
          updateValue(selectedSheet, exercise.id, 'kg', this.value);
        });
        inputs[1].addEventListener('input', function () {
          updateValue(selectedSheet, exercise.id, 'sec', this.value);
        });

        list.appendChild(row);
      });
    }

    loadValues();
  </script>
</body>
</html>
